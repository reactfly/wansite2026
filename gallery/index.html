<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0f">
    <title>Galeria Premium | Wanbitha</title>
    
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- GSAP for animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js" defer></script>
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/gallery.css">
    <link rel="stylesheet" href="css/lightbox.css">
</head>
<body>
    <!-- Header -->
    <header class="gallery-header">
        <div class="header-content">
            <h1 class="gallery-title">
                <span class="title-word">Portfolio</span>
                <span class="title-word">Fotográfico</span>
            </h1>
            <p class="gallery-subtitle">Explore nossa coleção de momentos capturados com arte e precisão</p>
        </div>
        <button class="gyro-permission-btn" id="gyroPermissionBtn" aria-label="Ativar sensores de movimento">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="5" y="2" width="14" height="20" rx="2" ry="2"/>
                <line x1="12" y1="18" x2="12" y2="18"/>
            </svg>
            <span>Ativar Gyro</span>
        </button>
    </header>

    <!-- Gallery Grid -->
    <main class="gallery-container" id="galleryContainer">
        <div class="gallery-grid" id="galleryGrid" role="list" aria-label="Galeria de imagens">
            <!-- Cards will be dynamically generated -->
        </div>
    </main>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Visualização de imagem em tela cheia" hidden>
        <div class="lightbox-backdrop" id="lightboxBackdrop"></div>
        
        <!-- Close Button -->
        <button class="lightbox-close" id="lightboxClose" aria-label="Fechar visualização">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        </button>
        
        <!-- Navigation Arrows -->
        <button class="lightbox-nav lightbox-prev" id="lightboxPrev" aria-label="Imagem anterior">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
        </button>
        <button class="lightbox-nav lightbox-next" id="lightboxNext" aria-label="Próxima imagem">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="9 18 15 12 9 6"/>
            </svg>
        </button>
        
        <!-- Image Container -->
        <div class="lightbox-image-container" id="lightboxImageContainer">
            <img class="lightbox-image" id="lightboxImage" src="" alt="" draggable="false">
        </div>
        
        <!-- Controls -->
        <div class="lightbox-controls">
            <div class="lightbox-counter">
                <span id="lightboxCurrent">1</span> / <span id="lightboxTotal">12</span>
            </div>
            <div class="lightbox-zoom-controls">
                <button class="zoom-btn" id="zoomOut" aria-label="Diminuir zoom">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        <line x1="8" y1="11" x2="14" y2="11"/>
                    </svg>
                </button>
                <span class="zoom-level" id="zoomLevel">100%</span>
                <button class="zoom-btn" id="zoomIn" aria-label="Aumentar zoom">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        <line x1="11" y1="8" x2="11" y2="14"/>
                        <line x1="8" y1="11" x2="14" y2="11"/>
                    </svg>
                </button>
            </div>
        </div>
        
        <!-- Live region for screen readers -->
        <div class="sr-only" aria-live="polite" id="lightboxAnnouncer"></div>
    </div>

    <!-- Loading Indicator -->
    <div class="loading-indicator" id="loadingIndicator" hidden>
        <div class="loading-spinner"></div>
    </div>

    <!-- Scripts -->
    <script src="js/utils.js" defer></script>
    <script src="js/card-tilt.js" defer></script>
    <script src="js/lightbox.js" defer></script>
    <script src="js/scroll-animations.js" defer></script>
    <script src="js/gallery.js" defer></script>
</body>
</html>
